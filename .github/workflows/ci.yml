# .github/workflows/ci.yml
#
# Pipeline CI simplifié — teste uniquement ce qui existe.
# Les jobs Frontend et Terraform seront réactivés quand
# ces composants seront créés (Phases 5 et 7).
#
# POURQUOI CE FICHIER EST IMPORTANT :
#   À chaque push sur main ou develop, GitHub exécute ce pipeline.
#   Si un test échoue, GitHub envoie un email et le push est marqué
#   comme "failing" — signal visuel que quelque chose est cassé.
#   C'est le Shift-Left Security en pratique.

name: CI — Lint & Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ----------------------------------------------------------------
  # BACKEND PYTHON — seul job actif pour l'instant
  # ----------------------------------------------------------------
  backend-tests:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        # On installe seulement ce dont les tests ont besoin
        # pas toutes les dépendances lourdes (fastapi, llm-guard, etc.)
        run: |
          pip install pytest pytest-cov groq

      - name: Run backend tests
        run: |
          pytest tests/backend/ -v --tb=short

      # [SECURITY] Audit des dépendances installées
      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit --requirement backend/requirements.txt --skip-editable || true
        continue-on-error: true  # Ne pas bloquer si pip-audit trouve des warnings mineurs

  # ----------------------------------------------------------------
  # FRONTEND REACT — désactivé jusqu'à la Phase 5
  # ----------------------------------------------------------------
  # frontend-tests:
  #   name: Frontend (React)
  #   ... sera activé en Phase 5

  # ----------------------------------------------------------------
  # TERRAFORM — désactivé jusqu'à la Phase 7
  # ----------------------------------------------------------------
  # terraform-validate:
  #   name: Terraform Validate
  #   ... sera activé en Phase 7
