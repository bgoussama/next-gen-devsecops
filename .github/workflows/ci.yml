# .github/workflows/ci.yml
#
# POURQUOI CE FICHIER EXISTE :
#   C'est le pipeline CI (Continuous Integration) qui tourne automatiquement
#   sur chaque push et pull request. Il applique le principe Shift-Left :
#   les problèmes de qualité et de sécurité sont détectés dès le commit,
#   pas lors du déploiement.
#
# POURQUOI GITHUB ACTIONS ET PAS JENKINS ICI :
#   Jenkins est utilisé pour le pipeline de déploiement (CD — Continuous Delivery)
#   des Jenkinsfiles générés par l'IA. GitHub Actions gère le CI du projet
#   lui-même (lint, tests). Les deux sont complémentaires.

name: CI — Lint & Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ----------------------------------------------------------------
  # Backend : lint + tests unitaires Python
  # ----------------------------------------------------------------
  backend-tests:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          cd backend
          pip install ruff
          ruff check .

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=70

      # [SECURITY] Scan des dépendances pour CVE connus
      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          cd backend
          pip-audit -r requirements.txt

  # ----------------------------------------------------------------
  # Frontend : lint + tests React
  # ----------------------------------------------------------------
  frontend-tests:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Run tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false

      # [SECURITY] Audit des dépendances npm
      - name: Security audit (npm audit)
        run: |
          cd frontend
          npm audit --audit-level=high

  # ----------------------------------------------------------------
  # Terraform : validation statique des configurations IaC
  # ----------------------------------------------------------------
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      - name: Terraform Init
        run: |
          cd terraform/environments/staging
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd terraform/environments/staging
          terraform validate

      # [SECURITY] Checkov : analyse statique de sécurité Terraform
      # Détecte les misconfigurations AWS avant le apply
      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: false
