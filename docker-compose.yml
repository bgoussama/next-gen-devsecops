# docker-compose.yml
# Stack de développement locale complète
# Lance tous les services d'infrastructure dont le projet a besoin
#
# Usage :
#   docker-compose up -d         → démarrer tous les services en arrière-plan
#   docker-compose logs -f       → suivre les logs en temps réel
#   docker-compose down          → arrêter et supprimer les conteneurs
#   docker-compose down -v       → arrêter + supprimer les volumes (reset données)

version: '3.8'

services:

  # ----------------------------------------------------------------
  # BACKEND — Orchestrateur FastAPI
  # Démarre le serveur Python sur le port 8000
  # ----------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextgen-backend
    ports:
      - "8000:8000"
    environment:
      # Les variables sont lues depuis le .env local
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DEBUG=${DEBUG:-False}
    volumes:
      # Mount en dev pour hot-reload sans rebuild
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - nextgen-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # REDIS — Cache pour le rate limiting
  # Stocke le compteur de requêtes par user/IP avec TTL automatique
  # On choisit Redis plutôt qu'une DB SQL car :
  #   - TTL natif (clés qui expirent automatiquement)
  #   - Opérations atomiques INCR (pas de race conditions)
  #   - Ultra-rapide pour des compteurs en mémoire
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nextgen-redis
    ports:
      - "6379:6379"
    # Persistance RDB : snapshot toutes les 60s si au moins 1 écriture
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - nextgen-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # SONARQUBE — Analyse statique (SAST)
  # Interface web sur http://localhost:9000
  # Login initial : admin / admin (à changer immédiatement)
  # ----------------------------------------------------------------
  sonarqube:
    image: sonarqube:10-community
    container_name: nextgen-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      - sonar-db
    networks:
      - nextgen-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # POSTGRESQL — Base de données pour SonarQube
  # SonarQube ne peut pas fonctionner avec SQLite en production
  # ----------------------------------------------------------------
  sonar-db:
    image: postgres:15-alpine
    container_name: nextgen-sonar-db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    networks:
      - nextgen-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # PROMETHEUS — Collecte des métriques
  # Scrape les endpoints /metrics du backend toutes les 15s
  # Interface web : http://localhost:9090
  # ----------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: nextgen-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - nextgen-network
    restart: unless-stopped

  # ----------------------------------------------------------------
  # GRAFANA — Visualisation des métriques
  # Interface web : http://localhost:3001
  # Login : admin / ${GRAFANA_ADMIN_PASSWORD}
  # ----------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: nextgen-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - nextgen-network
    restart: unless-stopped

# ----------------------------------------------------------------
# VOLUMES — Persistance des données entre redémarrages
# ----------------------------------------------------------------
volumes:
  redis_data:
  sonarqube_data:
  sonarqube_logs:
  sonar_db_data:
  prometheus_data:
  grafana_data:

# ----------------------------------------------------------------
# RÉSEAU — Isolation : les services ne communiquent qu'entre eux
# ----------------------------------------------------------------
networks:
  nextgen-network:
    driver: bridge
